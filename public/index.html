<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
    }

    form {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
    }

    input, button {
      width: 100%;
      margin: 10px 0;
      padding: 8px;
    }

    button {
      background: #007BFF;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<form action="/cadastrar" method="POST">
  <input type="text" name="nome" placeholder="Nome">
  <button>Enviar</button>
</form>

</body>
</html>
